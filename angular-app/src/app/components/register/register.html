<div class="login-page">
  <div class="bg-glow"></div>
  
  <div class="login-card">
    <div class="logo">FITNESS<span>APP</span></div>
    
    <div class="title-block">
      <h2 class="card-title">NEW OPERATOR REGISTRATION</h2>
      <p class="subtitle">Создайте аккаунт для доступа к системе</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="input-stack">
        <div class="input-group">
          <label>IDENTIFIER (USERNAME)</label>
          <input type="text" name="username" [(ngModel)]="regData.username" placeholder="Username" required>
        </div>

        <div class="input-group">
          <label>EMAIL</label>
          <input type="email" name="email" [(ngModel)]="regData.email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
          <label>PASSWORD</label>
          <input type="password" name="password" [(ngModel)]="regData.password" placeholder="••••••••" required>
        </div>
      </div>

      @if (errorMessage) {
        <div class="error-alert">{{ errorMessage }}</div>
      }

      <button type="submit" class="btn-glow">CREATE ACCOUNT</button>
    </form>
    
    <div class="footer-links">
      <span>ALREADY REGISTERED? <a routerLink="/login">SYSTEM LOGIN</a></span>
    </div>
  </div>
</div>
